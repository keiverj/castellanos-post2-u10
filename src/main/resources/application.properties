# Configuración de la aplicación — Post-Contenido 2 Unidad 10
spring.application.name=castellanos-post2-u10

# Base de datos H2 en memoria
spring.datasource.url=jdbc:h2:mem:tareasdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Consola H2 (solo desarrollo)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Puerto del servidor
server.port=8080

# Actuator: expone /actuator/health para el pipeline de CI
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
